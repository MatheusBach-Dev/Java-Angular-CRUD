<div class="container">
  <h1 class="titulo">Editar Comida</h1>

  <form [formGroup]="form" (ngSubmit)="onSubmit()">
    <input type="text" formControlName="title" placeholder="Nome da Comida">
    <input type="text" formControlName="price" placeholder="R$0,00" mask="separator.2" prefix="R$ " thousandSeparator="." decimalMarker="," >
    <!-- a linha de cima depois do placeholder, define uma mascara para os preços -->
    <input type="text" formControlName="image" placeholder="URL da imagem">
    <button type="submit" class="save">Salvar</button>

    <button routerLink="" class="save">Voltar</button>
  </form>

</div>
